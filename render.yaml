services:
  # ⚖️ Virtual Court Backend (API + WebSockets)
  - type: web
    name: virtual-court-server
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: virtual-court-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: EVIDENCE_ENCRYPTION_KEY
        generateValue: true
      - key: GROK_API_KEY
        sync: false # Set this manually in the Render dashboard

  # 🖥️ Virtual Court Frontend (React SPA)
  - type: web
    name: virtual-court-client
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: virtual-court-server
          property: host
    # Redirect all routes to index.html for React Router
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: virtual-court-db
    plan: free
    databaseName: virtual_court
    user: court_admin
