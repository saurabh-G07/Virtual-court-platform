<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Valura AI Microservice System Architecture Design</title>
  <desc id="desc">Clean architecture diagram for Valura AI showing the request pipeline, data context, LLM classifier, routed agents, and SSE response without overlapping arrows.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#142033" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263241"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1266b0"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8.6" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c14435"/>
    </marker>
    <style>
      .bg { fill: #f5f7fb; }
      .boundary { fill: #ffffff; stroke: #cad3df; stroke-width: 3; }
      .lane { fill: #fbfcfe; stroke: #dbe2ec; stroke-width: 2; stroke-dasharray: 10 8; }
      .title { font: 800 44px Inter, Segoe UI, Arial, sans-serif; fill: #17202c; letter-spacing: 0; }
      .subtitle { font: 400 20px Inter, Segoe UI, Arial, sans-serif; fill: #526070; }
      .lane-title { font: 800 16px Inter, Segoe UI, Arial, sans-serif; fill: #435064; letter-spacing: 0.6px; text-transform: uppercase; }
      .node-title { font: 800 22px Inter, Segoe UI, Arial, sans-serif; fill: #17202c; }
      .node-body { font: 400 15px Inter, Segoe UI, Arial, sans-serif; fill: #45566a; }
      .pill { font: 800 13px Inter, Segoe UI, Arial, sans-serif; fill: #ffffff; letter-spacing: 0.4px; text-transform: uppercase; }
      .edge-label { font: 700 14px Inter, Segoe UI, Arial, sans-serif; fill: #344153; }
      .small { font: 400 13px Inter, Segoe UI, Arial, sans-serif; fill: #65758a; }
      .card { stroke-width: 2.5; rx: 14; filter: url(#shadow); }
      .flow { fill: none; stroke: #263241; stroke-width: 4; marker-end: url(#arrow); }
      .flow-light { fill: none; stroke: #7d8796; stroke-width: 3; marker-end: url(#arrow); }
      .flow-data { fill: none; stroke: #7d8796; stroke-width: 3; stroke-dasharray: 9 8; marker-end: url(#arrow); }
      .flow-stream { fill: none; stroke: #1266b0; stroke-width: 4; stroke-dasharray: 14 10; marker-end: url(#arrow-blue); }
      .flow-block { fill: none; stroke: #c14435; stroke-width: 4; stroke-dasharray: 8 8; marker-end: url(#arrow-red); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1120"/>

  <text x="90" y="82" class="title">Valura AI Microservice Architecture</text>
  <text x="92" y="118" class="subtitle">Clean request pipeline: safety first, one classifier call, deterministic routing, streamed SSE response</text>

  <rect x="70" y="155" width="1660" height="845" rx="30" class="boundary"/>
  <text x="100" y="197" class="lane-title">Valura AI Microservice Boundary</text>

  <!-- Lanes -->
  <rect x="105" y="230" width="1590" height="155" rx="22" class="lane"/>
  <text x="130" y="263" class="lane-title">Presentation / HTTP</text>

  <rect x="105" y="420" width="1590" height="250" rx="22" class="lane"/>
  <text x="130" y="453" class="lane-title">Core Execution Pipeline</text>

  <rect x="105" y="705" width="1590" height="220" rx="22" class="lane"/>
  <text x="130" y="738" class="lane-title">Context, Agents, and Deterministic Data</text>

  <!-- Main pipeline nodes -->
  <rect x="150" y="480" width="210" height="118" class="card" fill="#f9fafc" stroke="#b9c2d0"/>
  <circle cx="183" cy="522" r="18" fill="#e4e9f1"/>
  <text x="211" y="514" class="node-title">User Client</text>
  <text x="180" y="552" class="node-body">Web / mobile app</text>
  <text x="180" y="576" class="node-body">Query + context</text>

  <rect x="450" y="260" width="245" height="100" class="card" fill="#eaf5ff" stroke="#56a3df"/>
  <text x="480" y="300" class="node-title">FastAPI Endpoint</text>
  <text x="480" y="329" class="node-body">HTTP ingress</text>
  <text x="480" y="352" class="node-body">SSE response only</text>

  <rect x="450" y="480" width="245" height="118" class="card" fill="#fff0e6" stroke="#ee8b4a"/>
  <text x="480" y="520" class="node-title">Safety Guard</text>
  <text x="480" y="549" class="node-body">Rule-based local filter</text>
  <text x="480" y="573" class="node-body">Blocks in under 10ms</text>

  <rect x="800" y="480" width="275" height="118" class="card" fill="#f1ecff" stroke="#9474e8"/>
  <text x="830" y="520" class="node-title">Intent Classifier</text>
  <text x="830" y="549" class="node-body">Exactly one LLM call</text>
  <text x="830" y="573" class="node-body">Intent, entities, safety verdict</text>

  <rect x="850" y="260" width="230" height="100" class="card" fill="#e7fbff" stroke="#36a9bb"/>
  <text x="880" y="300" class="node-title">GPT-4o-mini</text>
  <text x="880" y="329" class="node-body">Strict JSON schema</text>
  <text x="880" y="352" class="node-body">Eval model: GPT-4.1</text>

  <rect x="1190" y="480" width="245" height="118" class="card" fill="#eef2f6" stroke="#8d99a8"/>
  <text x="1220" y="520" class="node-title">Agent Router</text>
  <text x="1220" y="549" class="node-body">Deterministic dispatch</text>
  <text x="1220" y="573" class="node-body">Fallback-safe contract</text>

  <!-- Lower lane nodes -->
  <rect x="455" y="780" width="240" height="100" class="card" fill="#eaf7f5" stroke="#45a99b"/>
  <text x="485" y="820" class="node-title">Session Memory</text>
  <text x="485" y="849" class="node-body">Bounded in-memory dict</text>
  <text x="485" y="872" class="node-body">Last N turns per session</text>

  <rect x="760" y="780" width="215" height="100" class="card" fill="#f4eefb" stroke="#9b72c9"/>
  <text x="790" y="820" class="node-title">User Profiles</text>
  <text x="790" y="849" class="node-body">Holdings, KYC</text>
  <text x="790" y="872" class="node-body">Risk profile</text>

  <rect x="1020" y="780" width="215" height="100" class="card" fill="#fff7df" stroke="#d7aa3f"/>
  <text x="1050" y="820" class="node-title">Market Data</text>
  <text x="1050" y="849" class="node-body">Mock FX rates</text>
  <text x="1050" y="872" class="node-body">Stable benchmarks</text>

  <rect x="1280" y="740" width="300" height="120" class="card" fill="#eaf8ee" stroke="#55a76a"/>
  <text x="1310" y="780" class="node-title">Portfolio Health Agent</text>
  <text x="1310" y="809" class="node-body">Rule-based, no LLM</text>
  <text x="1310" y="833" class="node-body">Risk, performance, benchmark</text>
  <text x="1310" y="857" class="node-body">Novice-friendly disclaimer</text>

  <rect x="1280" y="890" width="300" height="95" class="card" fill="#f4f6f9" stroke="#aeb8c6"/>
  <text x="1310" y="928" class="node-title">Stub Agents</text>
  <text x="1310" y="957" class="node-body">Structured not implemented response</text>
  <text x="1310" y="980" class="node-body">Market research, support, strategy</text>

  <!-- Refusal node placed off the main line -->
  <rect x="765" y="630" width="340" height="68" rx="14" fill="#fff4f1" stroke="#d76657" stroke-width="2.5"/>
  <text x="795" y="660" class="node-title" font-size="20">Professional Refusal</text>
  <text x="795" y="683" class="node-body">Classifier is skipped when safety blocks</text>

  <!-- Main orthogonal arrows: no overlaps -->
  <path d="M360 539 H450" class="flow"/>
  <text x="382" y="525" class="edge-label">1. request</text>

  <path d="M572 360 V480" class="flow"/>
  <text x="592" y="425" class="edge-label">2. extract</text>

  <path d="M695 539 H800" class="flow"/>
  <text x="725" y="525" class="edge-label">3. pass</text>

  <path d="M1075 539 H1190" class="flow"/>
  <text x="1100" y="525" class="edge-label">4. route</text>

  <path d="M1435 598 V740" class="flow"/>
  <text x="1455" y="675" class="edge-label">portfolio_health</text>

  <path d="M1315 598 V890" class="flow-light"/>
  <text x="1220" y="690" class="edge-label">other agents</text>

  <!-- LLM call: isolated vertical line -->
  <path d="M965 480 V360" class="flow-data"/>
  <text x="985" y="430" class="edge-label">schema prompt</text>

  <!-- Data/context: separated lower bus -->
  <path d="M575 780 V650 H865 V598" class="flow-data"/>
  <text x="615" y="670" class="edge-label">history for follow-ups</text>

  <path d="M868 780 V700 H1395 V740" class="flow-data"/>
  <path d="M1128 780 V720 H1465 V740" class="flow-data"/>
  <text x="982" y="715" class="edge-label">portfolio context + deterministic benchmark data</text>

  <!-- Block and return flows kept outside main path -->
  <path d="M572 598 V664 H765" class="flow-block"/>
  <text x="592" y="646" class="edge-label" fill="#c14435">blocked</text>

  <path d="M1430 740 V690 H1630 V310 H695" class="flow-stream"/>
  <text x="1390" y="680" class="edge-label" fill="#1266b0">5. structured output</text>

  <path d="M450 310 H255 V480" class="flow-stream"/>
  <text x="270" y="300" class="edge-label" fill="#1266b0">6. SSE stream</text>

  <!-- Callout panel -->
  <rect x="1165" y="245" width="455" height="130" rx="18" fill="#ffffff" stroke="#cfd7e4" stroke-width="2"/>
  <text x="1195" y="282" class="node-title" font-size="20">Key engineering decisions</text>
  <text x="1195" y="315" class="node-body">One LLM call per accepted query controls cost.</text>
  <text x="1195" y="339" class="node-body">Safety and portfolio health are deterministic.</text>
  <text x="1195" y="363" class="node-body">Timeouts and errors are streamed as SSE events.</text>

  <!-- Legend -->
  <rect x="1268" y="62" width="405" height="80" rx="14" fill="#ffffff" stroke="#d6deea" stroke-width="2"/>
  <line x1="1294" y1="89" x2="1360" y2="89" class="flow"/>
  <text x="1378" y="95" class="small">Primary request flow</text>
  <line x1="1294" y1="119" x2="1360" y2="119" class="flow-stream"/>
  <text x="1378" y="125" class="small">SSE response / async return</text>

  <!-- Footer -->
  <rect x="120" y="1025" width="1540" height="58" rx="14" fill="#17202c"/>
  <text x="150" y="1062" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#ffffff">Flow:</text>
  <text x="215" y="1062" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="400" fill="#dfe6f0">Client -> FastAPI -> Safety Guard -> Classifier -> Router -> Portfolio Health / Stub Agent -> FastAPI -> Client via SSE</text>
</svg>
