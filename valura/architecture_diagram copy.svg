<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
    </pattern>

    <!-- Arrow Markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>

    <!-- Drop Shadows -->
    <filter id="box-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Header Gradient -->
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="#0d1117"/>
  <rect width="1200" height="800" fill="url(#grid)"/>

  <!-- Title -->
  <g transform="translate(40, 30)">
    <rect width="360" height="60" rx="12" fill="url(#header-grad)" stroke="#a855f7" stroke-width="1" filter="url(#box-shadow)"/>
    <text x="180" y="32" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Valura System Design</text>
  </g>

  <!-- Connectors / Lines -->
  <!-- Client to FastAPI -->
  <path d="M 230 400 L 290 400" stroke="#3b82f6" stroke-width="2.5" fill="none" marker-end="url(#arrow-blue)"/>
  <path d="M 290 380 L 230 380" stroke="#6b7280" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arrow)"/>
  
  <!-- FastAPI to Session -->
  <path d="M 390 355 L 390 250" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- FastAPI to Safety -->
  <path d="M 480 400 L 515 400 L 515 245 L 540 245" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Safety to Classifier -->
  <path d="M 640 290 L 640 345" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrow-green)"/>
  <!-- Safety to FastAPI (Blocked) -->
  <path d="M 550 220 L 450 220 L 450 345" stroke="#ef4444" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arrow-red)"/>
  
  <!-- Classifier to LLM -->
  <path d="M 730 390 L 840 390" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 840 410 L 730 410" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Classifier to Router -->
  <path d="M 640 445 L 640 500" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Router to Portfolio -->
  <path d="M 730 555 L 840 555" stroke="#14b8a6" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Portfolio to Data -->
  <path d="M 940 600 L 940 655" stroke="#6b7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  
  <!-- Portfolio to FastAPI (Stream back) -->
  <path d="M 860 600 L 860 630 L 390 630 L 390 455" stroke="#3b82f6" stroke-dasharray="5,5" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>


  <!-- Edge Labels -->
  <!-- Using stroke to create an outline for readability over grid and lines -->
  <g font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" stroke="#0d1117" stroke-width="4" paint-order="stroke">
    <text x="245" y="415" fill="#3b82f6">Query</text>
    <text x="235" y="370" fill="#9ca3af">SSE Stream</text>
    
    <text x="495" y="325" fill="#9ca3af">Parse</text>
    <text x="455" y="212" fill="#ef4444">Blocked</text>
    <text x="650" y="325" fill="#10b981">If Safe</text>
    
    <text x="750" y="382" fill="#9ca3af">Prompt</text>
    <text x="755" y="425" fill="#9ca3af">Output</text>
    
    <text x="750" y="545" fill="#9ca3af">Route (portfolio_health)</text>
    
    <text x="560" y="620" fill="#3b82f6">Async SSE Response Stream</text>
  </g>


  <!-- Nodes -->
  <!-- Client -->
  <g transform="translate(50, 355)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#a78bfa" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">📱</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">User Client</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Mobile / Web App</text>
  </g>

  <!-- FastAPI -->
  <g transform="translate(300, 355)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#3b82f6" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🚀</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">API Gateway</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">FastAPI &amp; SSE Streaming</text>
  </g>

  <!-- Session Memory -->
  <g transform="translate(300, 150)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#ec4899" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🗄️</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Session Memory</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">In-Memory Dict Cache</text>
  </g>

  <!-- Safety Guard -->
  <g transform="translate(550, 200)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#ef4444" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🛡️</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Safety Guard</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Sync, Rule-Based (&lt;10ms)</text>
  </g>

  <!-- Intent Classifier -->
  <g transform="translate(550, 355)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#f59e0b" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🧠</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Intent Classifier</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Context &amp; Entities</text>
  </g>

  <!-- Router -->
  <g transform="translate(550, 510)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#eab308" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🚦</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Agent Router</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Deterministic Switch</text>
  </g>

  <!-- LLM -->
  <g transform="translate(850, 355)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#10b981" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🤖</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">GPT-4o-mini</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">JSON Schema Enforced</text>
  </g>

  <!-- Portfolio Health -->
  <g transform="translate(850, 510)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#14b8a6" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">🏥</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Portfolio Health</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Rule-Based Specialist</text>
  </g>

  <!-- Data -->
  <g transform="translate(850, 665)">
    <rect width="180" height="90" rx="12" fill="#161b22" stroke="#64748b" stroke-width="2" filter="url(#box-shadow)"/>
    <text x="90" y="35" font-size="26" text-anchor="middle" dominant-baseline="middle">📊</text>
    <text x="90" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Market &amp; User Data</text>
    <text x="90" y="75" font-family="'Segoe UI', sans-serif" font-size="11" fill="#9ca3af" text-anchor="middle" dominant-baseline="middle">Pydantic Models</text>
  </g>

</svg>
